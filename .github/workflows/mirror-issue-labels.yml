name: Mirror Issue Labels to PRs

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
  issues:
    types: [labeled, unlabeled]

jobs:
  mirror-labels:
    name: Mirror issue labels to connected PRs
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Mirror labels
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            function isAutomationActor(login) {
              if (!login) return false;
              return login.endsWith('[bot]') || /^copilot[-_\s]/i.test(login);
            }

            function parseLinkedIssueNumbers(body) {
              if (!body) return [];
              const pattern =
                /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+(?:[a-zA-Z0-9_.-]+\/[a-zA-Z0-9_.-]+#|#)(\d+)/gi;
              const numbers = [];
              let match;
              while ((match = pattern.exec(body)) !== null) {
                const number = parseInt(match[1], 10);
                if (!numbers.includes(number)) numbers.push(number);
              }
              return numbers;
            }

            async function getLinkedIssueNumbersForPR(prNumber) {
              const linked = new Set();

              const closingIssuesQuery = `
                query($owner: String!, $repo: String!, $number: Int!, $after: String) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      closingIssuesReferences(first: 100, after: $after) {
                        nodes {
                          number
                          repository {
                            owner { login }
                            name
                          }
                        }
                        pageInfo { hasNextPage endCursor }
                      }
                    }
                  }
                }
              `;

              let closingAfter = null;
              while (true) {
                const result = await github.graphql(closingIssuesQuery, {
                  owner,
                  repo,
                  number: prNumber,
                  after: closingAfter,
                });

                const connection = result.repository.pullRequest.closingIssuesReferences;
                for (const issue of connection.nodes) {
                  if (!issue?.repository) continue;
                  if (issue.repository.owner.login === owner && issue.repository.name === repo) {
                    linked.add(issue.number);
                  }
                }

                if (!connection.pageInfo.hasNextPage) break;
                closingAfter = connection.pageInfo.endCursor;
              }

              const crossRefsQuery = `
                query($owner: String!, $repo: String!, $number: Int!, $after: String) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      timelineItems(first: 100, after: $after, itemTypes: [CROSS_REFERENCED_EVENT]) {
                        nodes {
                          ... on CrossReferencedEvent {
                            source {
                              __typename
                              ... on Issue {
                                number
                                repository {
                                  owner { login }
                                  name
                                }
                              }
                            }
                          }
                        }
                        pageInfo { hasNextPage endCursor }
                      }
                    }
                  }
                }
              `;

              let crossRefAfter = null;
              while (true) {
                const result = await github.graphql(crossRefsQuery, {
                  owner,
                  repo,
                  number: prNumber,
                  after: crossRefAfter,
                });

                const connection = result.repository.pullRequest.timelineItems;
                for (const node of connection.nodes) {
                  const source = node?.source;
                  if (!source || source.__typename !== 'Issue' || !source.repository) continue;
                  if (source.repository.owner.login === owner && source.repository.name === repo) {
                    linked.add(source.number);
                  }
                }

                if (!connection.pageInfo.hasNextPage) break;
                crossRefAfter = connection.pageInfo.endCursor;
              }

              return Array.from(linked);
            }

            async function applyMissingLabels(itemNumber, sourceLabels, sourceNumber) {
              if (sourceLabels.length === 0) return;

              const { data: itemData } = await github.rest.issues.get({
                owner,
                repo,
                issue_number: itemNumber,
              });

              const existing = itemData.labels.map((label) => label.name);
              const toAdd = sourceLabels.filter((label) => !existing.includes(label));

              if (toAdd.length === 0) {
                core.info(`#${itemNumber} already has all labels from #${sourceNumber} - skipping.`);
                return;
              }

              core.info(`Adding [${toAdd.join(', ')}] to #${itemNumber} (mirrored from #${sourceNumber})`);
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: itemNumber,
                labels: toAdd,
              });
            }

            async function getConnectedPRNumbers(issueNumber) {
              const query = `
                query($owner: String!, $repo: String!, $number: Int!, $after: String) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $number) {
                      timelineItems(first: 100, after: $after, itemTypes: [CROSS_REFERENCED_EVENT]) {
                        nodes {
                          ... on CrossReferencedEvent {
                            source {
                              __typename
                              ... on PullRequest { number }
                            }
                          }
                        }
                        pageInfo { hasNextPage endCursor }
                      }
                    }
                  }
                }
              `;

              const connectedPRNumbers = new Set();
              let after = null;

              while (true) {
                const result = await github.graphql(query, { owner, repo, number: issueNumber, after });
                const connection = result.repository.issue.timelineItems;

                for (const node of connection.nodes) {
                  if (node.source && node.source.__typename === 'PullRequest') {
                    connectedPRNumbers.add(node.source.number);
                  }
                }

                if (!connection.pageInfo.hasNextPage) break;
                after = connection.pageInfo.endCursor;
              }

              return Array.from(connectedPRNumbers);
            }

            if (context.payload.pull_request) {
              const pr = context.payload.pull_request;
              core.info(`Processing PR #${pr.number} (${context.payload.action})`);

              if (isAutomationActor(context.actor)) {
                core.info(`PR event triggered by automation actor (${context.actor}) - skipping to prevent loop.`);
                return;
              }

              const bodyLinkedIssueNumbers = parseLinkedIssueNumbers(pr.body);
              const metadataLinkedIssueNumbers = await getLinkedIssueNumbersForPR(pr.number);
              const linkedIssueNumbers = Array.from(
                new Set([...bodyLinkedIssueNumbers, ...metadataLinkedIssueNumbers])
              );

              core.info(
                `Linked issue numbers found for PR: ` +
                (linkedIssueNumbers.length > 0 ? linkedIssueNumbers.join(', ') : 'none')
              );

              if (linkedIssueNumbers.length === 0) {
                core.info('No linked issues - nothing to mirror.');
                return;
              }

              for (const issueNumber of linkedIssueNumbers) {
                let issueData;
                try {
                  ({ data: issueData } = await github.rest.issues.get({
                    owner,
                    repo,
                    issue_number: issueNumber,
                  }));
                } catch (err) {
                  core.warning(`Could not fetch issue #${issueNumber}: ${err.message}`);
                  continue;
                }

                if (issueData.pull_request) {
                  core.info(`#${issueNumber} is a PR, not an issue - skipping.`);
                  continue;
                }

                const issueLabels = issueData.labels.map((label) => label.name);
                core.info(`Labels on issue #${issueNumber}: ${issueLabels.join(', ') || 'none'}`);

                await applyMissingLabels(pr.number, issueLabels, issueNumber);
              }
              return;
            }

            const issue = context.payload.issue;
            core.info(`Processing issue #${issue.number} (${context.payload.action})`);

            const currentIssueLabels = issue.labels.map((label) => label.name);
            core.info(`Current labels on #${issue.number}: ${currentIssueLabels.join(', ') || 'none'}`);

            const connectedPRNumbers = await getConnectedPRNumbers(issue.number);
            core.info(
              `Connected PRs: ` +
              (connectedPRNumbers.length > 0 ? connectedPRNumbers.map((number) => `#${number}`).join(', ') : 'none')
            );

            if (connectedPRNumbers.length === 0) {
              core.info('No connected PRs - nothing to mirror.');
              return;
            }

            for (const prNumber of connectedPRNumbers) {
              await applyMissingLabels(prNumber, currentIssueLabels, issue.number);
            }
