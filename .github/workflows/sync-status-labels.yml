name: Sync Status Labels

on:
  issues:
    types: [labeled, unlabeled]
  pull_request:
    types:
      [
        labeled,
        unlabeled,
        closed,
        reopened,
        review_requested,
        review_request_removed,
        ready_for_review,
        converted_to_draft,
      ]
  pull_request_review:
    types: [submitted, dismissed]

jobs:
  sync:
    name: Sync status label to connected issues/PRs
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Sync status labels
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const STATUS_PREFIX = 'Status: ';
            const STATUS_IN_PROGRESS = 'Status: In Progress';
            const STATUS_REVIEW_REQUESTED = 'Status: Review Requested';
            const STATUS_APPROVED = 'Status: Approved';
            const STATUS_MERGED = 'Status: Merged';

            function isAutomationActor(login) {
              if (!login) return false;
              return login.endsWith('[bot]') || /^copilot[-_\s]/i.test(login);
            }

            async function ensureLabelExists(labelName) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: labelName });
              } catch {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: labelName,
                  color: 'fbca04',
                });
                core.info(`Created label: ${labelName}`);
              }
            }

            async function getConnectedPRNumbers(issueNumber) {
              const query = `
                query($owner: String!, $repo: String!, $number: Int!, $after: String) {
                  repository(owner: $owner, name: $repo) {
                    issue(number: $number) {
                      timelineItems(first: 100, after: $after, itemTypes: [CROSS_REFERENCED_EVENT]) {
                        nodes {
                          ... on CrossReferencedEvent {
                            source {
                              __typename
                              ... on PullRequest { number }
                            }
                          }
                        }
                        pageInfo { hasNextPage endCursor }
                      }
                    }
                  }
                }
              `;

              const connected = new Set();
              let after = null;

              while (true) {
                const result = await github.graphql(query, { owner, repo, number: issueNumber, after });
                const connection = result.repository.issue.timelineItems;

                for (const node of connection.nodes) {
                  if (node.source && node.source.__typename === 'PullRequest') {
                    connected.add(node.source.number);
                  }
                }

                if (!connection.pageInfo.hasNextPage) break;
                after = connection.pageInfo.endCursor;
              }

              return Array.from(connected);
            }

            async function getLinkedIssueNumbersForPR(prNumber) {
              const linked = new Set();

              const closingIssuesQuery = `
                query($owner: String!, $repo: String!, $number: Int!, $after: String) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      closingIssuesReferences(first: 100, after: $after) {
                        nodes {
                          number
                          repository {
                            owner { login }
                            name
                          }
                        }
                        pageInfo { hasNextPage endCursor }
                      }
                    }
                  }
                }
              `;

              let closingAfter = null;
              while (true) {
                const result = await github.graphql(closingIssuesQuery, {
                  owner,
                  repo,
                  number: prNumber,
                  after: closingAfter,
                });

                const connection = result.repository.pullRequest.closingIssuesReferences;
                for (const issue of connection.nodes) {
                  if (!issue?.repository) continue;
                  if (issue.repository.owner.login === owner && issue.repository.name === repo) {
                    linked.add(issue.number);
                  }
                }

                if (!connection.pageInfo.hasNextPage) break;
                closingAfter = connection.pageInfo.endCursor;
              }

              const crossRefsQuery = `
                query($owner: String!, $repo: String!, $number: Int!, $after: String) {
                  repository(owner: $owner, name: $repo) {
                    pullRequest(number: $number) {
                      timelineItems(first: 100, after: $after, itemTypes: [CROSS_REFERENCED_EVENT]) {
                        nodes {
                          ... on CrossReferencedEvent {
                            source {
                              __typename
                              ... on Issue {
                                number
                                repository {
                                  owner { login }
                                  name
                                }
                              }
                            }
                          }
                        }
                        pageInfo { hasNextPage endCursor }
                      }
                    }
                  }
                }
              `;

              let crossRefAfter = null;
              while (true) {
                const result = await github.graphql(crossRefsQuery, {
                  owner,
                  repo,
                  number: prNumber,
                  after: crossRefAfter,
                });

                const connection = result.repository.pullRequest.timelineItems;
                for (const node of connection.nodes) {
                  const source = node?.source;
                  if (!source || source.__typename !== 'Issue' || !source.repository) continue;
                  if (source.repository.owner.login === owner && source.repository.name === repo) {
                    linked.add(source.number);
                  }
                }

                if (!connection.pageInfo.hasNextPage) break;
                crossRefAfter = connection.pageInfo.endCursor;
              }

              return Array.from(linked);
            }

            async function syncExactStatusLabels(itemNumber, effectiveStatusLabels) {
              const { data: itemData } = await github.rest.issues.get({
                owner,
                repo,
                issue_number: itemNumber,
              });

              const itemStatusLabels = itemData.labels
                .map((label) => label.name)
                .filter((name) => name.startsWith(STATUS_PREFIX));

              for (const stale of itemStatusLabels) {
                if (!effectiveStatusLabels.includes(stale)) {
                  core.info(`Removing "${stale}" from #${itemNumber}`);
                  await github.rest.issues.removeLabel({
                    owner,
                    repo,
                    issue_number: itemNumber,
                    name: stale,
                  });
                }
              }

              const labelsToAdd = effectiveStatusLabels.filter((label) => !itemStatusLabels.includes(label));
              if (labelsToAdd.length > 0) {
                for (const label of labelsToAdd) {
                  await ensureLabelExists(label);
                }
                core.info(`Adding [${labelsToAdd.join(', ')}] to #${itemNumber}`);
                await github.rest.issues.addLabels({
                  owner,
                  repo,
                  issue_number: itemNumber,
                  labels: labelsToAdd,
                });
              }
            }

            function deriveStatusFromPREvent(pr) {
              if (context.eventName === 'pull_request_review') {
                const reviewState = (context.payload.review?.state || '').toLowerCase();
                if (reviewState === 'approved') return STATUS_APPROVED;
                return STATUS_IN_PROGRESS;
              }

              const action = context.payload.action;
              if (action === 'closed' && pr.merged) return STATUS_MERGED;
              if (action === 'review_requested') return STATUS_REVIEW_REQUESTED;
              if (action === 'review_request_removed') {
                const hasPendingReviewers =
                  (pr.requested_reviewers?.length || 0) > 0 ||
                  (pr.requested_teams?.length || 0) > 0;
                return hasPendingReviewers ? STATUS_REVIEW_REQUESTED : STATUS_IN_PROGRESS;
              }
              if (action === 'reopened' || action === 'ready_for_review' || action === 'converted_to_draft') {
                return STATUS_IN_PROGRESS;
              }
              return null;
            }

            const isPRLabelEvent =
              context.eventName === 'pull_request' &&
              (context.payload.action === 'labeled' || context.payload.action === 'unlabeled');

            const isIssueLabelEvent =
              context.eventName === 'issues' &&
              (context.payload.action === 'labeled' || context.payload.action === 'unlabeled');

            const isPRStatusTransitionEvent =
              context.eventName === 'pull_request_review' ||
              (context.eventName === 'pull_request' && !isPRLabelEvent);

            if (isPRStatusTransitionEvent) {
              const pr = context.payload.pull_request;
              if (!pr) {
                core.info('No PR payload found - skipping.');
                return;
              }

              const desiredStatus = deriveStatusFromPREvent(pr);
              if (!desiredStatus) {
                core.info(`Action "${context.payload.action}" has no status mapping - skipping.`);
                return;
              }

              core.info(`PR #${pr.number} transitioned to status: ${desiredStatus}`);

              const effectiveStatusLabels = [desiredStatus];
              await syncExactStatusLabels(pr.number, effectiveStatusLabels);

              const linkedIssueNumbers = await getLinkedIssueNumbersForPR(pr.number);
              core.info(
                `Linked issues for #${pr.number}: ` +
                (linkedIssueNumbers.length > 0 ? linkedIssueNumbers.map((number) => `#${number}`).join(', ') : 'none')
              );

              for (const issueNumber of linkedIssueNumbers) {
                await syncExactStatusLabels(issueNumber, effectiveStatusLabels);
              }

              return;
            }

            if (!isPRLabelEvent && !isIssueLabelEvent) {
              core.info(`Event ${context.eventName}/${context.payload.action} is not handled here - skipping.`);
              return;
            }

            if (isAutomationActor(context.actor)) {
              core.info(`Triggered by automation actor (${context.actor}) - skipping to prevent loop.`);
              return;
            }

            const labelName = context.payload.label?.name;
            if (!labelName) {
              core.info('No label found in payload - skipping.');
              return;
            }
            if (!labelName.startsWith(STATUS_PREFIX)) {
              core.info(`Label "${labelName}" is not a Status label - skipping.`);
              return;
            }

            const isPR = context.eventName === 'pull_request';
            const number = context.payload.pull_request
              ? context.payload.pull_request.number
              : context.payload.issue.number;

            core.info(
              `Processing ${isPR ? 'PR' : 'issue'} #${number}, ` +
              `action: ${context.payload.action}, label: ${labelName}`
            );

            const rawLabels = isPR
              ? context.payload.pull_request.labels
              : context.payload.issue.labels;
            const rawStatusLabels = rawLabels
              .map((label) => label.name)
              .filter((name) => name.startsWith(STATUS_PREFIX));

            core.info(
              `Current status labels on #${number}: ` +
              (rawStatusLabels.join(', ') || 'none')
            );

            let effectiveStatusLabels;
            if (context.payload.action === 'labeled') {
              const staleOnTrigger = rawStatusLabels.filter((label) => label !== labelName);
              for (const stale of staleOnTrigger) {
                core.info(`Removing stale label "${stale}" from #${number}`);
                await github.rest.issues.removeLabel({
                  owner,
                  repo,
                  issue_number: number,
                  name: stale,
                });
              }
              effectiveStatusLabels = [labelName];
              core.info(`Enforced single status label on #${number}: ${labelName}`);
            } else {
              effectiveStatusLabels = rawStatusLabels;
            }

            const connectedItems = isPR
              ? (await getLinkedIssueNumbersForPR(number)).map((linkedNumber) => ({ number: linkedNumber, type: 'issue' }))
              : (await getConnectedPRNumbers(number)).map((linkedNumber) => ({ number: linkedNumber, type: 'pr' }));

            core.info(
              `Found ${connectedItems.length} connected item(s): ` +
              (connectedItems.map((item) => `#${item.number} (${item.type})`).join(', ') || 'none')
            );

            if (connectedItems.length === 0) {
              core.info('No connected items - nothing to sync.');
              return;
            }

            for (const item of connectedItems) {
              await syncExactStatusLabels(item.number, effectiveStatusLabels);

              const syncedLabels = effectiveStatusLabels.length > 0
                ? effectiveStatusLabels.map((label) => `**${label}**`).join(', ')
                : 'none';
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: item.number,
                body: `🔄 Status label(s) automatically synced from #${number}: ${syncedLabels}.`,
              });

              core.info(`Synced status labels on #${item.number}.`);
            }
