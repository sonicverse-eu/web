<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Sonicverse</title>
  <desc id="desc">Open source tools for collaborative sound experiences.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07111f" />
      <stop offset="55%" stop-color="#12314f" />
      <stop offset="100%" stop-color="#1d5b78" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity="0.36" />
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />
  <circle cx="980" cy="150" r="140" fill="#f59e0b" fill-opacity="0.16" />
